name: Deploy RemoteMcpServer to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'RemoteMcpServer/**'
      - '.github/workflows/deploy-remote-mcp-server.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: >
          dotnet publish RemoteMcpServer/RemoteMcpServer.csproj
          -c Release
          -r linux-x64
          --self-contained false
          -o publish/remote

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish/remote
